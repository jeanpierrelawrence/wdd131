<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jp Lawrence">

    <link rel="stylesheet" href="styles/form.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Thank you!</title>
</head>
<body>
    <header>
        <h1>Thank you for your review!</h1>
    </header>
    <main>
        <p>Total reviews submitted: <span id="review-count">0</span></p>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> | Jp Lawrence | South Africa</p>
        <p id="lastModified"></p>
    </footer>
    <script>
        let count = Number(window.localStorage.getItem("review-total")) || 0;
        count++;

        localStorage.setItem("review-total", count);
        document.getElementById("review-count").textContent = count;
    </script>
</body>
</html>
