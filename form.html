<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jp Lawrence">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Form</title>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form action="review.html" method="get">
            <label for="product-name">Product Name</label>
            <select name="product-name" id="product-name" required>
                <option value="first-option" selected disabled>Select a Product ...</option>
            </select>

            <div class="rating">
                <label for="one-star">1&star;</label>
                <input type="radio" name="rating" id="one-star" value="1" required>
                <label for="two-stars">2&star;</label>
                <input type="radio" name="rating" id="two-stars" value="2" required>
                <label for="three-stars">3&star;</label>
                <input type="radio" name="rating" id="three-stars" value="3" required>
                <label for="four-stars">4&star;</label>
                <input type="radio" name="rating" id="four-stars" value="4" required>
                <label for="five-stars">5&star;</label>
                <input type="radio" name="rating" id="five-stars" value="5" required>
            </div>

            <label for="date">Date of Installation</label>
            <input type="date" name="date" id="date" required>

            <div class="features">
                <label for="durability">Durability</label>
                <input type="checkbox" name="durability" id="durability" value="durability">
                <label for="design">Design</label>
                <input type="checkbox" name="design" id="design" value="design">
                <label for="ease">Ease of Use</label>
                <input type="checkbox" name="ease-of-use" id="ease" value="ease-of-use">
                <label for="performance">Performance</label>
                <input type="checkbox" name="performance" id="performance" value="performance">
            </div>

            <label for="review">Your review:</label>
            <textarea name="user-review" id="review"></textarea>

            <label for="username">Your name:</label>
            <input type="text" id="username" name="username" placeholder="Full name...">

            <input type="submit" value="Submit Review">
        </form>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> | Jp Lawrence | South Africa</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
